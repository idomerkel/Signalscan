<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Signal Scan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: monospace; overflow: hidden; }
        #overlay { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 100; }
        button { background: #0f0; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #status { position: absolute; top: 10px; left: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="status">RF_SCANNER_V1.0: STANDBY</div>
    <div id="overlay">
        <button id="scanBtn">INITIALIZE 3D SCAN</button>
    </div>

    <script>
        let scene, camera, renderer, points, geometry;
        const count = 8000;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const cols = new Float32Array(count * 3);

            for(let i=0; i<count; i++) {
                pos[i*3] = (Math.random()-0.5) * 15;
                pos[i*3+1] = (Math.random()-0.5) * 15;
                pos[i*3+2] = (Math.random()-0.5) * 2;
                cols[i*3] = 0; cols[i*3+1] = 0.5; cols[i*3+2] = 0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            
            const mat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true });
            points = new THREE.Points(geometry, mat);
            scene.add(points);

            camera.position.z = 10;
            animate();
        }

        document.getElementById('scanBtn').onclick = function() {
            document.getElementById('status').innerText = "SCANNING REAL-TIME INTERFERENCE...";
            const positions = geometry.attributes.position.array;
            const colors = geometry.attributes.color.array;

            for(let i=0; i<count; i++) {
                let x = positions[i*3];
                let y = positions[i*3+1];
                let d = Math.sqrt(x*x + y*y);
                // Simulate signal height mapping
                positions[i*3+2] = Math.sin(d * 1.5) * (5/d);
                // Color mapping (green to red for interference)
                colors[i*3] = positions[i*3+2] > 1 ? 1 : 0; 
                colors[i*3+1] = 1 - (positions[i*3+2]/5);
            }
            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;
        };

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.z += 0.002;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
