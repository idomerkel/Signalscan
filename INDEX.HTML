<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Signal Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; z-index: 10; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>CELLULAR 3D SCANNER</h2>
        <p>Status: <span id="status">Ready</span></p>
        <button onclick="startScan()">START SIGNAL SCAN</button>
    </div>

    <script>
        let scene, camera, renderer, points;
        const particleCount = 5000;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            
            // Initial Flat Grid
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 10;     // X
                positions[i * 3 + 1] = (Math.random() - 0.5) * 10; // Y
                positions[i * 3 + 2] = 0;                          // Z (Height/Signal)
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.05, vertexColors: true });
            points = new THREE.Points(geometry, material);
            scene.add(points);

            camera.position.z = 8;
            camera.position.y = -5;
            camera.lookAt(0,0,0);
            animate();
        }

        function startScan() {
            document.getElementById('status').innerText = "Scanning RF Environment...";
            const posAttr = points.geometry.attributes.position;
            
            // This simulates translating signal strength to 3D geometry
            for (let i = 0; i < particleCount; i++) {
                // Simulate a "Signal Peak" (The Antenna location)
                let x = posAttr.array[i * 3];
                let y = posAttr.array[i * 3 + 1];
                let dist = Math.sqrt(x*x + y*y);
                
                // Z-axis becomes the signal strength (higher = stronger)
                let signalStrength = Math.exp(-dist * 0.5) * 3 * Math.random();
                posAttr.array[i * 3 + 2] = signalStrength;
            }
            posAttr.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.z += 0.005;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
